<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMB AI ELITE | 2026</title>
    <style>
        :root { --bg: #080a0f; --prim: #00ff88; --accent: #00d4ff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        nav { background: rgba(20,24,35,0.9); display: flex; justify-content: space-around; padding: 15px; border-bottom: 1px solid #333; }
        nav button { background: none; border: 1px solid transparent; color: #888; padding: 10px; cursor: pointer; font-weight: bold; }
        nav button.active { color: var(--prim); border-bottom: 2px solid var(--prim); }

        .screen { display: none; flex-direction: column; padding: 20px; height: 100%; overflow-y: auto; animation: fadeIn 0.5s; }
        .active-screen { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: #11141d; padding: 20px; border-radius: 15px; border: 1px solid #2d3436; margin-bottom: 15px; }
        .q-card { border-left: 4px solid var(--prim); margin-bottom: 20px; padding: 15px; background: #1a1f2b; border-radius: 8px; }
        
        .opt-btn { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; background: #252c39; border: 1px solid transparent; color: white; border-radius: 8px; cursor: pointer; }
        .opt-btn:hover { border-color: var(--prim); }

        #chat-logs { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 80%; line-height: 1.4; }
        .user { background: var(--accent); color: #000; align-self: flex-end; }
        .ai { background: #2d3436; align-self: flex-start; }

        .input-box { display: flex; gap: 10px; padding: 15px; background: #05070a; border-top: 1px solid #333; }
        input { flex-grow: 1; background: #1e2533; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; }
        .btn { background: var(--prim); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <button onclick="window.showScreen('home')" id="btn-home" class="active">HOME</button>
    <button onclick="window.showScreen('exam')" id="btn-exam">EXAM</button>
    <button onclick="window.showScreen('chat')" id="btn-chat">AI CHAT</button>
    <button onclick="window.showScreen('settings')" id="btn-settings">SETTINGS</button>
</nav>

<div id="home" class="screen active-screen">
    <div class="card" style="text-align:center;">
        <h1>JAMB AI ELITE</h1>
        <p>Ready for 180 questions?</p>
        <button class="btn" onclick="window.showScreen('exam')">START MOCK</button>
    </div>
</div>

<div id="exam" class="screen">
    <div id="status" style="text-align:center; color:var(--prim); margin-bottom:10px;"></div>
    <div id="exam-init" style="text-align:center;">
        <button class="btn" onclick="window.generateExam()">GENERATE QUESTIONS</button>
    </div>
    <div id="exam-area"></div>
</div>

<div id="chat" class="screen" style="padding:0;">
    <div id="chat-logs" style="padding:20px;"></div>
    <div class="input-box">
        <input type="text" id="chat-input" placeholder="Ask anything...">
        <button class="btn" onclick="window.sendChat()">SEND</button>
    </div>
</div>

<div id="settings" class="screen">
    <div class="card">
        <h2>Settings</h2>
        <input type="password" id="api-key" placeholder="Paste API Key here...">
        <button class="btn" style="width:100%; margin-top:10px;" onclick="window.saveKey()">SAVE KEY</button>
    </div>
</div>

<script type="importmap">
  { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // --- NAVIGATION ---
    window.showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active-screen');
        document.getElementById('btn-'+id).classList.add('active');
    };

    window.saveKey = () => {
        const key = document.getElementById('api-key').value.trim();
        localStorage.setItem('jamb_key', key);
        alert("Key saved!");
    };

    // --- CORE AI CALL (With Cleaner Logic) ---
    async function askAI(prompt) {
        const key = localStorage.getItem('jamb_key');
        if(!key) return "Error: No API Key found in Settings.";
        
        try {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const result = await model.generateContent(prompt);
            let response = await result.response.text();
            
            // Clean up Markdown formatting if AI sends it
            return response.replace(/```/g, "").trim();
        } catch (e) {
            console.error(e);
            return "Connection Error. Check your internet or API key.";
        }
    }

    // --- CHAT LOGIC ---
    window.sendChat = async () => {
        const input = document.getElementById('chat-input');
        const logs = document.getElementById('chat-logs');
        if(!input.value) return;

        logs.innerHTML += `<div class="msg user">${input.value}</div>`;
        const userQuery = input.value;
        input.value = "";
        logs.scrollTop = logs.scrollHeight;

        const reply = await askAI("Answer as a JAMB teacher: " + userQuery);
        logs.innerHTML += `<div class="msg ai">${reply}</div>`;
        logs.scrollTop = logs.scrollHeight;
    };

    // --- EXAM LOGIC (With Random Distractor Generator) ---
    window.generateExam = async () => {
        const status = document.getElementById('status');
        const area = document.getElementById('exam-area');
        status.innerText = "Connecting to AI... Please wait.";

        const prompt = `Generate 10 JAMB UTME questions. 
        Format: Question | CorrectAnswer
        Example: What is the boiling point of water?|100°C
        Strictly one per line. No numbers.`;

        const raw = await askAI(prompt);
        if(raw.startsWith("Connection Error") || raw.startsWith("Error")) {
            status.innerText = raw;
            return;
        }

        const lines = raw.split('\n').filter(l => l.includes('|'));
        const questions = lines.map(line => {
            const [q, correct] = line.split('|');
            
            // --- JAVASCRIPT RANDOM OPTION GENERATOR ---
            // These act as "fallbacks" so the AI doesn't have to work as hard
            const distractors = ["250", "Unknown", "Not in syllabus", "Depends on pressure", "None of these", "0.5", "10", "Zero"];
            let options = [correct.trim()];
            
            // Add 3 random distractors
            while(options.length < 4) {
                let d = distractors[Math.floor(Math.random() * distractors.length)];
                if(!options.includes(d)) options.push(d);
            }
            
            // Shuffle them
            options.sort(() => Math.random() - 0.5);
            return { question: q.trim(), options, correct: options.indexOf(correct.trim()) };
        });

        document.getElementById('exam-init').style.display = 'none';
        area.innerHTML = questions.map((q, i) => `
            <div class="q-card">
                <p><strong>${i+1}.</strong> ${q.question}</p>
                ${q.options.map((opt, oi) => `
                    <button class="opt-btn" onclick="check(this, ${oi === q.correct})">${opt}</button>
                `).join('')}
            </div>
        `).join('');
        status.innerText = "Success! Solve the questions below.";
    };

    window.check = (btn, isCorrect) => {
        btn.parentElement.querySelectorAll('button').forEach(b => b.style.borderColor = 'transparent');
        btn.style.borderColor = isCorrect ? '#00ff88' : '#ff4757';
        btn.style.background = isCorrect ? 'rgba(0,255,136,0.2)' : 'rgba(255,71,87,0.2)';
    };
</script>
</body>
</html>
