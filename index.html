<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAMB AI ELITE | 2026</title>
    <style>
        :root { --bg: #0a0c10; --card: #161b22; --prim: #00ff88; --accent: #58a6ff; --text: #f0f6fc; }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        /* THE SECRET: Flex Column ensures 100% visibility */
        html, body { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* 1. TOP NAVIGATION (Fixed Height) */
        nav { 
            flex: 0 0 60px; 
            background: var(--card); 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            border-bottom: 2px solid var(--prim);
            z-index: 10;
        }

        nav button { 
            background: none; border: none; color: #8b949e; 
            font-weight: bold; cursor: pointer; padding: 10px; font-size: 0.8rem;
        }

        nav button.active { color: var(--prim); border-bottom: 2px solid var(--prim); }

        /* 2. MIDDLE CONTENT (Expands to fill, Scrolls) */
        main {
            flex: 1; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active-screen { display: flex; animation: fadeIn 0.2s ease; }

        /* 3. BOTTOM BAR (Fixed Height, Always Visible) */
        footer {
            flex: 0 0 auto;
            background: var(--card);
            border-top: 1px solid #30363d;
            padding: 10px;
            display: none; /* Only shows on Chat screen */
        }

        .chat-active footer { display: block; }

        /* UI ELEMENTS */
        .glass-card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .btn { background: var(--prim); color: #0d1117; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; }
        
        .input-group { display: flex; gap: 8px; }
        .input-group input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; font-size: 16px; }

        .bubble { padding: 12px; border-radius: 12px; max-width: 85%; margin-bottom: 10px; line-height: 1.4; font-size: 0.9rem; }
        .user-bubble { background: var(--accent); align-self: flex-end; }
        .ai-bubble { background: #30363d; align-self: flex-start; border-left: 3px solid var(--prim); }

        .q-card { background: #0d1117; border-left: 4px solid var(--prim); padding: 12px; margin-bottom: 15px; border-radius: 6px; }
        .opt { display: block; width: 100%; text-align: left; padding: 10px; margin: 5px 0; background: #21262d; border: 1px solid #30363d; color: white; border-radius: 6px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="home-active">

<nav>
    <button onclick="window.showScreen('home')" id="nav-home" class="active">HOME</button>
    <button onclick="window.showScreen('exam')" id="nav-exam">MOCK</button>
    <button onclick="window.showScreen('chat')" id="nav-chat">TUTOR</button>
    <button onclick="window.showScreen('settings')" id="nav-settings">⚙️</button>
</nav>

<main id="main-content">
    <div id="home" class="screen active-screen">
        <div class="glass-card" style="text-align:center;">
            <h1 style="color:var(--prim); margin:0 0 10px 0;">JAMB 2026</h1>
            <select id="subject-select" style="width:100%; padding:10px; margin-bottom:15px; background:#0d1117; color:white; border-radius:8px;">
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Biology">Biology</option>
                <option value="Mathematics">Mathematics</option>
            </select>
            <button class="btn" onclick="window.showScreen('exam')">START PRACTICE</button>
        </div>
    </div>

    <div id="exam" class="screen">
        <div id="timer" style="text-align:center; font-size: 1.2rem; color: var(--prim); font-weight: 900; margin-bottom: 10px;">120:00</div>
        <button class="btn" id="gen-btn" onclick="window.generateQuiz()">GENERATE QUESTIONS</button>
        <div id="quiz-container" style="margin-top:15px;"></div>
    </div>

    <div id="chat" class="screen">
        <div id="chat-window" style="display:flex; flex-direction:column;">
            <div class="bubble ai-bubble">Ready to study! Ask me anything.</div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="glass-card">
            <h3>API Configuration</h3>
            <input type="password" id="api-key-input" placeholder="Paste Key Here..." style="width:100%; padding:12px; margin-bottom:10px; background:#0d1117; color:white; border-radius:8px;">
            <button class="btn" onclick="window.saveKey()">SAVE SETTINGS</button>
        </div>
    </div>
</main>

<footer id="chat-controls">
    <div class="input-group">
        <input type="text" id="chat-input" placeholder="Ask a question...">
        <button class="btn" style="width:auto; padding:0 20px;" onclick="window.sendChat()">SEND</button>
        <button class="btn" style="width:auto; background:#ff4b2b; color:white;" onclick="window.clearChat()">×</button>
    </div>
</footer>

<script type="importmap">
  { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    window.showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active-screen');
        document.getElementById('nav-' + id).classList.add('active');
        
        // Toggle footer visibility for Chat
        if(id === 'chat') document.body.classList.add('chat-active');
        else document.body.classList.remove('chat-active');
        
        document.getElementById('main-content').scrollTop = 0;
    };

    window.saveKey = () => {
        const k = document.getElementById('api-key-input').value.trim();
        if(k) { localStorage.setItem('jamb_key_v6', k); alert("Key Saved!"); }
    };

    async function talkToAI(prompt) {
        const key = localStorage.getItem('jamb_key_v6');
        if(!key) { alert("Add API Key in Settings!"); return null; }
        try {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const result = await model.generateContent(prompt);
            return result.response.text();
        } catch (e) { return "ERROR"; }
    }

    window.sendChat = async () => {
        const box = document.getElementById('chat-input');
        const win = document.getElementById('chat-window');
        if(!box.value) return;
        const text = box.value;
        win.innerHTML += `<div class="bubble user-bubble">${text}</div>`;
        box.value = "";
        
        const response = await talkToAI("Answer as a JAMB teacher: " + text);
        win.innerHTML += `<div class="bubble ai-bubble">${response === "ERROR" ? "Check API key!" : response}</div>`;
        document.getElementById('main-content').scrollTop = document.getElementById('main-content').scrollHeight;
    };

    window.clearChat = () => {
        document.getElementById('chat-window').innerHTML = '<div class="bubble ai-bubble">Chat cleared! What next?</div>';
    };

    window.generateQuiz = async () => {
        const subject = document.getElementById('subject-select').value;
        const container = document.getElementById('quiz-container');
        document.getElementById('gen-btn').innerText = "Loading Questions...";

        const prompt = `Generate 10 JAMB questions for ${subject}. Format: Question | CorrectAnswer.`;
        const raw = await talkToAI(prompt);
        if(raw === "ERROR") { document.getElementById('gen-btn').innerText = "Retry Generation"; return; }

        const lines = raw.split('\n').filter(l => l.includes('|'));
        container.innerHTML = lines.map((line, i) => {
            const [q, ans] = line.split('|');
            const correct = ans.trim();
            let opts = [correct, "None", "Zero", "Increases"].sort(() => Math.random() - 0.5);
            return `<div class="q-card"><p><strong>${i+1}.</strong> ${q.trim()}</p>${opts.map(opt => `<button class="opt" onclick="window.checkAns(this, '${opt === correct}')">${opt}</button>`).join('')}</div>`;
        }).join('');
        document.getElementById('gen-btn').style.display = 'none';
    };

    window.checkAns = (btn, isCorrect) => {
        btn.parentElement.querySelectorAll('.opt').forEach(b => b.style.border = '1px solid #30363d');
        btn.style.border = isCorrect === 'true' ? '2px solid #00ff88' : '2px solid #ff4b2b';
        btn.style.background = isCorrect === 'true' ? 'rgba(0,255,136,0.1)' : 'rgba(255,75,43,0.1)';
    };
</script>
</body>
</html>
