<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JAMB AI ELITE | 2026</title>
    <style>
        :root {
            --bg: #0a0c10;
            --card: #161b22;
            --prim: #00ff88;
            --accent: #58a6ff;
            --text: #f0f6fc;
            --danger: #ff4b2b;
            --warning: #f59e0b;
            --border: #30363d;
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        html, body { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        body {
            padding: 70px 0px;
        }
        
        nav { 
            flex: 0 0 auto;
            background: var(--card); 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            border-bottom: 2px solid var(--prim);
            z-index: 100;
            padding: 10px 0;
        }

        nav button { 
            background: none; border: none; color: #8b949e; 
            font-weight: bold; cursor: pointer; padding: 10px; font-size: 0.85rem;
        }

        nav button.active { color: var(--prim); border-bottom: 2px solid var(--prim); }

        main {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .screen { display: none; flex-direction: column; height: 100%; }
        .active-screen { display: flex; animation: fadeIn 0.2s ease; }

        footer {
            flex: 0 0 auto;
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 10px;
            display: none;
            z-index: 100;
        }

        .chat-active footer { display: block; }

        .glass-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 15px; 
        }
        
        .btn { 
            background: var(--prim); 
            color: #0d1117; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            font-weight: 800; 
            cursor: pointer; 
            width: 100%;
        }

        .input-group { display: flex; gap: 8px; }
        .input-group input { 
            flex: 1; 
            background: #0d1117; 
            border: 1px solid var(--border); 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 16px;
        }

        .bubble { padding: 12px; border-radius: 12px; max-width: 85%; margin-bottom: 10px; line-height: 1.4; font-size: 0.9rem; }
        .user-bubble { background: var(--accent); align-self: flex-end; margin-left: auto; color: white; }
        .ai-bubble { background: #30363d; align-self: flex-start; border-left: 3px solid var(--prim); }

        .q-card { background: #0d1117; border-left: 4px solid var(--prim); padding: 15px; margin-bottom: 15px; border-radius: 6px; }
        .opt { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; background: #21262d; border: 1px solid var(--border); color: white; border-radius: 6px; }

        .timer { font-size: 1.5rem; color: var(--prim); font-weight: 800; text-align: center; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<nav>
    <button onclick="window.showScreen('home')" id="nav-home" class="active">HOME</button>
    <button onclick="window.showScreen('exam')" id="nav-exam">MOCK</button>
    <button onclick="window.showScreen('chat')" id="nav-chat">TUTOR</button>
    <button onclick="window.showScreen('settings')" id="nav-settings">⚙️</button>
</nav>

<main id="main-content">
    <div id="home" class="screen active-screen">
        <div class="glass-card" style="text-align:center;">
            <h1 style="color:var(--prim); margin:0 0 10px 0;">JAMB 2026</h1>
            <p>Select Subject for Practice:</p>
            <select id="subject-select" style="width:100%; padding:12px; background:#0d1117; color:white; border:1px solid var(--border); border-radius:8px; margin-bottom:15px;">
                <option value="English">English Language</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Biology">Biology</option>
            </select>
            <button class="btn" onclick="window.startExamGeneration()">START EXAM</button>
        </div>
    </div>

    <div id="exam" class="screen">
        <div class="timer" id="exam-timer">120:00</div>
        <div id="exam-content">
            <div class="glass-card" style="text-align:center;">
                <p>No questions loaded yet.</p>
            </div>
        </div>
        <button id="submit-exam" class="btn" style="background: var(--danger); margin-top:20px; display:none;" onclick="window.submitExam()">SUBMIT EXAM</button>
    </div>

    <div id="chat" class="screen">
        <div id="chat-window" style="display:flex; flex-direction:column;">
            <div class="bubble ai-bubble">I am your Gemini 2.5 Flash tutor. Ask me any question!</div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="glass-card">
            <h3>🔑 API Settings</h3>
            <input type="password" id="api-key-input" placeholder="Paste Gemini Key Here" style="width:100%; margin-bottom:15px;">
            <button class="btn" id="save-api-btn" onclick="window.saveKey()">SAVE KEY</button>
            <div style="margin-top: 20px; padding: 10px; background: #0d1117; border-radius: 8px;">
                <strong>📊 Usage Status</strong><br>
                <span id="quota-display">Model: Gemini 2.5 Flash</span>
                <p style="font-size: 0.7rem; color: var(--warning);">Note: Free tier allows ~10-15 calls per minute.</p>
            </div>
        </div>
    </div>
</main>

<footer id="chat-controls">
    <div class="input-group">
        <input type="text" id="chat-input" placeholder="Ask a question...">
        <button class="btn" style="width:auto; padding:0 20px;" onclick="window.sendChat()">SEND</button>
    </div>
</footer>

<script type="importmap">
    { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    let apiKey = localStorage.getItem('jamb_key_2026') || '';
    const GEMINI_MODEL = "gemini-2.5-flash"; // UPDATED MODEL
    let currentQuestions = [];
    let userAnswers = [];

    window.showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav-${id}`).classList.add('active');
        
        if (id === 'chat') document.body.classList.add('chat-active');
        else document.body.classList.remove('chat-active');
        document.getElementById('main-content').scrollTop = 0;
    };

    window.saveKey = () => {
        const val = document.getElementById('api-key-input').value.trim();
        if(val) { apiKey = val; localStorage.setItem('jamb_key_2026', val); alert("API Key Saved!"); }
    };

    async function callAI(prompt) {
        if (!apiKey) { alert("Please set API Key in Settings!"); return null; }
        try {
            const genAI = new GoogleGenerativeAI(apiKey);
            const model = genAI.getGenerativeModel({ model: GEMINI_MODEL });
            const result = await model.generateContent(prompt);
            return result.response.text();
        } catch (e) {
            console.error(e);
            return "ERROR";
        }
    }

    window.sendChat = async () => {
        const input = document.getElementById('chat-input');
        const win = document.getElementById('chat-window');
        if(!input.value) return;
        
        const msg = input.value;
        win.innerHTML += `<div class="bubble user-bubble">${msg}</div>`;
        input.value = "";
        
        const response = await callAI("Answer as a JAMB teacher: " + msg);
        win.innerHTML += `<div class="bubble ai-bubble">${response === "ERROR" ? "Error: Check API Key or Internet." : response}</div>`;
        document.getElementById('main-content').scrollTop = document.getElementById('main-content').scrollHeight;
    };

    window.startExamGeneration = async () => {
        const sub = document.getElementById('subject-select').value;
        const content = document.getElementById('exam-content');
        content.innerHTML = `<div class="glass-card">Generating 10 ${sub} questions...</div>`;
        window.showScreen('exam');

        const prompt = `Generate 10 JAMB questions for ${sub}. Format: Question | Correct Answer | Wrong 1 | Wrong 2 | Wrong 3.`;
        const raw = await callAI(prompt);

        if(raw === "ERROR") {
            content.innerHTML = `<div class="glass-card">Failed to load. Check API key.</div>`;
            return;
        }

        const lines = raw.split('\n').filter(l => l.includes('|'));
        currentQuestions = lines.map(line => {
            const parts = line.split('|').map(p => p.trim());
            const q = parts[0];
            const correct = parts[1];
            const options = parts.slice(1).sort(() => Math.random() - 0.5);
            return { q, correct, options };
        });

        renderQuestions();
        document.getElementById('submit-exam').style.display = 'block';
    };

    function renderQuestions() {
        const content = document.getElementById('exam-content');
        content.innerHTML = currentQuestions.map((q, i) => `
            <div class="q-card">
                <p><b>${i+1}.</b> ${q.q}</p>
                ${q.options.map(opt => `
                    <button class="opt" onclick="window.handleAnswer(this, '${opt}', '${q.correct}')">${opt}</button>
                `).join('')}
            </div>
        `).join('');
    }

    window.handleAnswer = (btn, selected, correct) => {
        const parent = btn.parentElement;
        parent.querySelectorAll('.opt').forEach(b => b.style.border = '1px solid var(--border)');
        btn.style.border = selected === correct ? '2px solid var(--prim)' : '2px solid var(--danger)';
    };

    window.submitExam = () => {
        alert("Exam submitted! Check your highlighted answers for accuracy.");
        window.showScreen('home');
    };

    if(apiKey) document.getElementById('api-key-input').value = apiKey;
</script>
</body>
</html>
